<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ascendant House Rulers Reference</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #171b24;
      --panel-2: #202634;
      --text: #f4f0e8;
      --muted: #b9b0a4;
      --accent: #d8a657;
      --border: rgba(255,255,255,0.12);
      --shadow: rgba(0,0,0,0.35);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top left, #252a3a 0, #0f1117 38%, #080a0f 100%);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }

    .wrap {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 38px 0 56px;
    }

    header {
      margin-bottom: 24px;
      padding: 26px;
      background: rgba(23, 27, 36, 0.86);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 20px 55px var(--shadow);
      backdrop-filter: blur(8px);
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3.25rem);
      letter-spacing: -0.04em;
      line-height: 1.05;
    }

    .subtitle {
      margin: 0;
      max-width: 820px;
      color: var(--muted);
      font-size: 1.02rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      margin: 24px 0;
      padding: 18px;
      background: rgba(23, 27, 36, 0.72);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    label {
      display: block;
      margin-bottom: 7px;
      color: var(--muted);
      font-size: 0.86rem;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    select, input {
      width: 100%;
      min-height: 46px;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 12px;
      background: var(--panel-2);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    button {
      min-height: 46px;
      padding: 0 18px;
      border: 0;
      border-radius: 12px;
      background: var(--accent);
      color: #16120a;
      font-weight: 800;
      cursor: pointer;
    }

    button:hover { filter: brightness(1.08); }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .card {
      padding: 16px;
      background: rgba(23, 27, 36, 0.76);
      border: 1px solid var(--border);
      border-radius: 18px;
    }

    .card .kicker {
      color: var(--muted);
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .card .value {
      margin-top: 5px;
      font-size: 1.1rem;
      font-weight: 750;
    }

    .planet-list {
      margin-top: 8px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 9px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: rgba(255,255,255,0.045);
      font-size: 0.86rem;
      line-height: 1.2;
    }

    .pill strong { color: #fff7e6; }
    .benefic { border-color: rgba(156, 220, 160, 0.36); background: rgba(156, 220, 160, 0.08); }
    .malefic { border-color: rgba(238, 128, 128, 0.34); background: rgba(238, 128, 128, 0.08); }
    .neutral { border-color: rgba(185, 176, 164, 0.34); background: rgba(185, 176, 164, 0.08); }
    .note { margin-top: 10px; color: var(--muted); font-size: 0.78rem; }

    .table-card {
      overflow: hidden;
      background: rgba(23, 27, 36, 0.86);
      border: 1px solid var(--border);
      border-radius: 22px;
      box-shadow: 0 18px 44px var(--shadow);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th, td {
      padding: 14px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      background: #222938;
      color: #fff4da;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }

    tr:last-child td { border-bottom: 0; }
    tbody tr:nth-child(even) { background: rgba(255,255,255,0.025); }
    tbody tr:hover { background: rgba(216,166,87,0.08); }

    .house-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 34px;
      height: 34px;
      border-radius: 999px;
      background: rgba(216,166,87,0.15);
      color: #ffe0a2;
      font-weight: 800;
    }

    .sign {
      font-weight: 800;
      color: #fff7e6;
    }

    .planet {
      color: var(--accent);
      font-weight: 700;
    }

    .muted { color: var(--muted); }

    .all-mode-title {
      margin: 32px 0 12px;
      font-size: 1.3rem;
    }

    .hidden { display: none; }

    @media (max-width: 760px) {
      .controls { grid-template-columns: 1fr; }
      .summary { grid-template-columns: 1fr; }
      th, td { padding: 11px 10px; font-size: 0.92rem; }
      .wrap { width: min(100% - 20px, 1120px); padding-top: 18px; }
      header { padding: 20px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <header>
      <h1>Ascendant House Rulers</h1>
      <p class="subtitle">A whole-sign reference table showing which zodiac sign rules each house for every ascendant, plus the traditional planetary ruler and basic house themes.</p>
    </header>

    <section class="controls" aria-label="Filters">
      <div>
        <label for="ascendantSelect">Choose ascendant</label>
        <select id="ascendantSelect"></select>
      </div>
      <button id="showAllBtn" type="button">Show All</button>
    </section>

    <section class="summary" id="summary"></section>

    <section class="table-card">
      <table>
        <thead>
          <tr>
            <th>House</th>
            <th>Sign Ruling the House</th>
            <th>Planetary Ruler</th>
            <th>House Themes</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
    </section>

    <section id="allTables" class="hidden"></section>
  </main>

  <script>
    const signs = [
      { name: "Aries", ruler: "Mars" },
      { name: "Taurus", ruler: "Venus" },
      { name: "Gemini", ruler: "Mercury" },
      { name: "Cancer", ruler: "Moon" },
      { name: "Leo", ruler: "Sun" },
      { name: "Virgo", ruler: "Mercury" },
      { name: "Libra", ruler: "Venus" },
      { name: "Scorpio", ruler: "Mars" },
      { name: "Sagittarius", ruler: "Jupiter" },
      { name: "Capricorn", ruler: "Saturn" },
      { name: "Aquarius", ruler: "Saturn" },
      { name: "Pisces", ruler: "Jupiter" }
    ];

    const houseThemes = [
      "Self, body, identity, appearance, life direction",
      "Money, speech, values, food, possessions",
      "Communication, siblings, skills, courage, short trips",
      "Home, mother, roots, property, emotional foundation",
      "Creativity, romance, children, joy, intelligence",
      "Work, health, service, routines, conflict, debts",
      "Marriage, partnerships, contracts, open opponents",
      "Transformation, secrets, shared assets, crisis, longevity",
      "Beliefs, higher learning, teachers, luck, long journeys",
      "Career, public image, status, authority, responsibility",
      "Friends, networks, gains, groups, hopes and wishes",
      "Solitude, sleep, loss, retreat, foreign lands, liberation"
    ];


    const planetNatures = {
      Aries: {
        benefic: [["Sun", "strong benefic"], ["Jupiter", "benefic"], ["Moon", "slightly benefic"]],
        malefic: [["Mercury", "strong malefic"], ["Venus", "strong malefic"], ["Saturn", "malefic"]],
        neutral: [["Mars", "mixed / neutral"]]
      },
      Taurus: {
        benefic: [["Saturn", "strong benefic"], ["Mercury", "benefic"]],
        malefic: [["Jupiter", "strong malefic"], ["Mars", "malefic"], ["Moon", "slightly malefic"]],
        neutral: [["Venus", "mixed / neutral"], ["Sun", "neutral"]]
      },
      Gemini: {
        benefic: [["Venus", "benefic"], ["Saturn", "slightly benefic"]],
        malefic: [["Mars", "strong malefic"], ["Jupiter", "malefic"], ["Sun", "slightly malefic"], ["Moon", "weak malefic"]],
        neutral: [["Mercury", "neutral / ascendant lord"]]
      },
      Cancer: {
        benefic: [["Mars", "strong benefic"], ["Jupiter", "benefic"], ["Moon", "benefic"], ["Sun", "slightly benefic"]],
        malefic: [["Saturn", "strong malefic"], ["Venus", "malefic"], ["Mercury", "malefic"]],
        neutral: []
      },
      Leo: {
        benefic: [["Mars", "strong benefic"], ["Jupiter", "benefic"], ["Sun", "benefic"]],
        malefic: [["Saturn", "strong malefic"], ["Mercury", "malefic"], ["Venus", "malefic"]],
        neutral: [["Moon", "neutral"]]
      },
      Virgo: {
        benefic: [["Venus", "strong benefic"], ["Mercury", "benefic"], ["Saturn", "slightly benefic"]],
        malefic: [["Mars", "strong malefic"], ["Jupiter", "malefic"], ["Moon", "malefic"], ["Sun", "weak malefic"]],
        neutral: []
      },
      Libra: {
        benefic: [["Saturn", "strong benefic"], ["Mercury", "benefic"], ["Venus", "slightly benefic"]],
        malefic: [["Jupiter", "strong malefic"], ["Mars", "malefic"], ["Sun", "slightly malefic"]],
        neutral: [["Moon", "neutral"]]
      },
      Scorpio: {
        benefic: [["Moon", "strong benefic"], ["Sun", "benefic"], ["Jupiter", "benefic"], ["Mars", "slightly benefic"]],
        malefic: [["Mercury", "strong malefic"], ["Venus", "malefic"], ["Saturn", "malefic"]],
        neutral: []
      },
      Sagittarius: {
        benefic: [["Sun", "strong benefic"], ["Mars", "benefic"], ["Jupiter", "benefic"]],
        malefic: [["Venus", "strong malefic"], ["Mercury", "malefic"], ["Saturn", "malefic"]],
        neutral: [["Moon", "neutral / mixed"]]
      },
      Capricorn: {
        benefic: [["Venus", "strong benefic"], ["Mercury", "benefic"], ["Saturn", "slightly benefic"]],
        malefic: [["Mars", "strong malefic"], ["Jupiter", "malefic"], ["Moon", "malefic"], ["Sun", "malefic"]],
        neutral: []
      },
      Aquarius: {
        benefic: [["Venus", "strong benefic"], ["Mercury", "benefic"], ["Saturn", "slightly benefic"]],
        malefic: [["Jupiter", "strong malefic"], ["Mars", "malefic"], ["Moon", "malefic"], ["Sun", "malefic"]],
        neutral: []
      },
      Pisces: {
        benefic: [["Mars", "strong benefic"], ["Moon", "benefic"], ["Jupiter", "benefic"]],
        malefic: [["Venus", "strong malefic"], ["Mercury", "malefic"], ["Saturn", "malefic"], ["Sun", "slightly malefic"]],
        neutral: []
      }
    };

    const select = document.getElementById("ascendantSelect");
    const tableBody = document.getElementById("tableBody");
    const summary = document.getElementById("summary");
    const allTables = document.getElementById("allTables");
    const showAllBtn = document.getElementById("showAllBtn");

    signs.forEach((sign, index) => {
      const option = document.createElement("option");
      option.value = index;
      option.textContent = `${sign.name} Ascendant`;
      if (sign.name === "Libra") option.selected = true;
      select.appendChild(option);
    });

    function getRows(ascIndex) {
      return Array.from({ length: 12 }, (_, houseIndex) => {
        const sign = signs[(ascIndex + houseIndex) % 12];
        return {
          house: houseIndex + 1,
          sign: sign.name,
          ruler: sign.ruler,
          theme: houseThemes[houseIndex]
        };
      });
    }

    function naturePills(items, className) {
      if (!items.length) return `<span class="muted">None emphasized</span>`;
      return `<div class="planet-list">${items.map(([planet, strength]) => `
        <span class="pill ${className}"><strong>${planet}</strong> ${strength}</span>
      `).join("")}</div>`;
    }

    function renderSummary(ascIndex) {
      const asc = signs[ascIndex];
      const nature = planetNatures[asc.name];
      summary.innerHTML = `
        <article class="card"><div class="kicker">Ascendant</div><div class="value">${asc.name} rising</div><div class="note">Functional planet nature by whole-sign house rulership.</div></article>
        <article class="card"><div class="kicker">Benefic planets</div>${naturePills(nature.benefic, "benefic")}</article>
        <article class="card"><div class="kicker">Malefic / neutral planets</div>${naturePills(nature.malefic, "malefic")}${nature.neutral.length ? `<div class="note">Neutral: ${nature.neutral.map(([p, s]) => `<span class="pill neutral"><strong>${p}</strong> ${s}</span>`).join(" ")}</div>` : ""}</article>
      `;
    }

    function renderTable(ascIndex) {
      allTables.classList.add("hidden");
      document.querySelector(".table-card").classList.remove("hidden");
      renderSummary(ascIndex);
      tableBody.innerHTML = getRows(ascIndex).map(row => `
        <tr>
          <td><span class="house-num">${row.house}</span></td>
          <td><span class="sign">${row.sign}</span> <span class="muted">rules house ${row.house}</span></td>
          <td><span class="planet">${row.ruler}</span></td>
          <td>${row.theme}</td>
        </tr>
      `).join("");
    }

    function renderAllTables() {
      document.querySelector(".table-card").classList.add("hidden");
      summary.innerHTML = `
        <article class="card"><div class="kicker">View</div><div class="value">All 12 ascendants</div></article>
        <article class="card"><div class="kicker">Method</div><div class="value">Whole-sign houses</div></article>
        <article class="card"><div class="kicker">Rulers</div><div class="value">Traditional planetary rulers</div></article>
      `;
      allTables.classList.remove("hidden");
      allTables.innerHTML = signs.map((asc, ascIndex) => `
        <h2 class="all-mode-title">${asc.name} Ascendant</h2>
        <section class="table-card">
          <table>
            <thead>
              <tr>
                <th>House</th>
                <th>Sign Ruling the House</th>
                <th>Planetary Ruler</th>
                <th>House Themes</th>
              </tr>
            </thead>
            <tbody>
              ${getRows(ascIndex).map(row => `
                <tr>
                  <td><span class="house-num">${row.house}</span></td>
                  <td><span class="sign">${row.sign}</span> <span class="muted">rules house ${row.house}</span></td>
                  <td><span class="planet">${row.ruler}</span></td>
                  <td>${row.theme}</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        </section>
      `).join("");
    }

    select.addEventListener("change", () => renderTable(Number(select.value)));
    showAllBtn.addEventListener("click", renderAllTables);

    renderTable(Number(select.value));
  </script>
</body>
</html>
